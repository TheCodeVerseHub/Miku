<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Miku Dashboard</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #2F3136;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        .container {
            text-align: center;
            color: white;
        }
        .logo {
            width: 100px;
            height: 100px;
            background: #5865F2;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 48px;
            font-weight: bold;
        }
        h1 {
            color: #5865F2;
            margin-bottom: 10px;
        }
        p {
            color: #B9BBBE;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">M</div>
        <h1>Miku Dashboard</h1>
        <p>Discord Leveling Bot</p>
    </div>
</body>
</html>
