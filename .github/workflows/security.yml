name: Security Audit

on:
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run pip-audit
        run: uv run pip-audit || echo "pip-audit not available"

      - name: Bandit security check
        run: uv run bandit -r src/ -c pyproject.toml || echo "Bandit not available"

      - name: Check for secrets
        run: |
          if grep -rq 'DISCORD_BOT_TOKEN\|DASHBOARD_CLIENT_SECRET' --include='*.py' --include='*.toml' --include='*.yaml' --include='*.yml' --include='*.json' . && ! grep -rq 'os.getenv\|os.environ' --include='*.py'; then
            echo "Potential secret leak detected!"
            exit 1
          fi
          echo "No obvious secrets leaked"
