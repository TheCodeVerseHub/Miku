# Miku - Nightly Maintenance
#
# Runs daily at 3 AM UTC:
#   1. Dependency vulnerability scan
#   2. Stale data cleanup
#   3. Performance report generation (if applicable)

name: Nightly Maintenance

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  dependabot:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Check dependencies
        run: |
          uv pip install --system pip-audit
          pip-audit --desc on -r requirements.txt -r dashboard/requirements.txt | tee audit-report.txt

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-audit
          path: audit-report.txt
