# Miku - CI/CD Pipeline
#
# Runs on every push and pull request:
#   1. Lint & format check (ruff)
#   2. Type check (mypy)
#   3. Unit tests (pytest with async support)
#   4. Build Docker image
#   5. Security scan (bandit, safety)
#
# On main branch pushes:
#   6. Build and push Docker image to GitHub Container Registry

name: CI/CD

on:
  push:
    branches: [main, develop]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.14"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Lint ─────────────────────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: |
          uv pip install --system ruff mypy

      - name: Check formatting (ruff)
        run: ruff check --output-format=github .

      - name: Type check (mypy)
        run: mypy src/ dashboard/ --ignore-missing-imports --warn-unused-ignores
        continue-on-error: true  # Don't block PRs on strict typing yet

  # ── Test ──────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: [lint]

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: miku_test
          POSTGRES_PASSWORD: miku_test
          POSTGRES_DB: miku_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: |
          uv pip install --system -e .
          uv pip install --system pytest pytest-asyncio pytest-cov httpx aioresponses

      - name: Run tests
        run: |
          pytest tests/ \
            --verbose \
            --cov=src \
            --cov=dashboard \
            --cov-report=term \
            --cov-report=xml \
            --timeout=30 \
            -x
        env:
          DATABASE_URL: postgresql+asyncpg://miku_test:miku_test@localhost:5432/miku_test
          DISCORD_BOT_TOKEN: test_token_ci
          GITHUB_TOKEN: ""
          DASHBOARD_CLIENT_ID: test
          DASHBOARD_CLIENT_SECRET: test
          DASHBOARD_SESSION_SECRET: test-session-secret-for-ci-only

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # ── Security Scan ────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Run Bandit (SAST)
        run: |
          uv pip install --system bandit
          bandit -r src/ dashboard/ -f json -o bandit-report.json || true

      - name: Check dependencies (Safety)
        run: |
          uv pip install --system safety
          safety check || true

  # ── Build Docker Image ──────────────────────────────────────────────
  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
