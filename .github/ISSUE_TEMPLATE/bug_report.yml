name: "Bug report"
description: "Report a reproducible problem"
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect to happen, and what actually happened?
      placeholder: "A clear and concise description of the bug."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide steps so we can reproduce the issue.
      placeholder: |
        1. Go to ...
        2. Run ...
        3. See error ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: Paste relevant logs or add screenshots.
      render: shell
    validations:
      required: false

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "e.g. Windows 11, Ubuntu 22.04"
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: Version / commit
      placeholder: "e.g. v1.2.3 or commit SHA"
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Anything else we should know?
    validations:
      required: false
