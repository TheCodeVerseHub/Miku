{% extends "base.html" %}
{% block title %}Leaderboard{% endblock %}
{% block content %}

<div x-data="leaderboardData()" x-init="init()">
    <div class="section-bar">
        <div>
            <div class="desc">Rankings for <strong>{{ guild_name or 'Server' }}</strong> — <span x-text="total + ' users tracked'">--</span></div>
        </div>
        <div class="section-actions">
            <div class="search-box">
                <input class="form-input" type="text" x-model="search" placeholder="Search by name or ID..." @input.debounce="load()">
                <button class="btn btn-ghost btn-sm" @click="search = ''; load()" x-show="search">Clear</button>
            </div>
        </div>
    </div>

    <div class="card" style="padding: 0;">
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th style="width: 52px;">Rank</th>
                        <th>Member</th>
                        <th>Level</th>
                        <th>XP</th>
                        <th>Messages</th>
                        <th style="width: 80px;">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <template x-for="(u, i) in users" :key="u.user_id">
                        <tr :class="i < 3 ? 'row-' + ['gold','silver','bronze'][i] : ''">
                            <td>
                                <div class="lb-rank" :class="offset + i < 3 ? 'lb-rank-' + (offset + i + 1) : 'lb-rank-default'" x-text="offset + i + 1"></div>
                            </td>
                            <td>
                                <a :href="`/guilds/{{ guild_id }}/users/${u.user_id}`" class="user-cell" style="text-decoration: none; color: inherit;">
                                    <div class="user-avatar">
                                        <img :src="u.avatar_url" :alt="u.username" @error="onAvatarError($event, u.user_id)">
                                    </div>
                                    <div class="user-info">
                                        <div class="user-name" x-text="u.display_name || u.username"></div>
                                        <div class="user-id" x-text="u.user_id"></div>
                                    </div>
                                </a>
                            </td>
                            <td><span class="badge badge-level" x-text="'Level ' + u.level"></span></td>
                            <td>
                                <div class="xp-bar-wrap">
                                    <div class="xp-bar">
                                        <div class="xp-bar-fill" :class="i < 3 ? ['gold','silver','bronze'][i] : ''" :style="'width: ' + xpPct(u) + '%'"></div>
                                    </div>
                                    <span class="xp-bar-text" x-text="fmtNum(u.xp)"></span>
                                </div>
                            </td>
                            <td x-text="fmtNum(u.messages)"></td>
                            <td>
                                <a :href="`/guilds/{{ guild_id }}/users/${u.user_id}`" class="btn btn-ghost btn-xs">View</a>
                            </td>
                        </tr>
                    </template>
                    <template x-if="loading">
                        <tr><td colspan="6" style="text-align: center; padding: 32px;">Loading...</td></tr>
                    </template>
                    <template x-if="!loading && users.length === 0">
                        <tr><td colspan="6" class="empty-state">No users found. <template x-if="search">Try a different search term.</template></td></tr>
                    </template>
                </tbody>
            </table>
        </div>

        <div class="pagination" style="padding: 16px 18px; margin: 0;">
            <button class="btn btn-ghost btn-sm" @click="prevPage()" :disabled="page <= 1">← Prev</button>
            <span class="pagination-info" x-text="`Page ${page} of ${totalPages}`"></span>
            <button class="btn btn-ghost btn-sm" @click="nextPage()" :disabled="page >= totalPages">Next →</button>
        </div>
    </div>
</div>

<script>
function leaderboardData() {
    return {
        users: [], total: 0, page: 1, perPage: 10, search: '', loading: false,
        get totalPages() { return Math.max(1, Math.ceil(this.total / this.perPage)); },
        get offset() { return (this.page - 1) * this.perPage; },
        async init() { await this.load(); },
        async load() {
            this.loading = true;
            const data = await API.getLeaderboard('{{ guild_id }}', this.perPage, this.offset, this.search);
            if (data) { this.users = data.users; this.total = data.total; }
            this.loading = false;
        },
        prevPage() { if (this.page > 1) { this.page--; this.load(); } },
        nextPage() { if (this.page < this.totalPages) { this.page++; this.load(); } },
        xpForLevel, xpPct, fmtNum
    };
}
</script>

{% endblock %}
