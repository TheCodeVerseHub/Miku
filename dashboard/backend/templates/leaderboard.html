{% extends "base.html" %}
{% block title %}Leaderboard{% endblock %}
{% block content %}

<div x-data="leaderboardData()" x-init="init()">
    <div class="page-header">
        <div>
            <h2>Leaderboard</h2>
            <p x-text="`${total} total users tracked`">--</p>
        </div>
        <div class="search-box">
            <input class="form-input" type="text" x-model="search" placeholder="Search by user ID..." @input.debounce="load()">
        </div>
    </div>

    <div class="card">
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th style="width: 60px;">Rank</th>
                        <th>Member</th>
                        <th>Level</th>
                        <th>XP</th>
                        <th>Messages</th>
                        <th style="width: 80px;">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <template x-for="(u, i) in users" :key="u.user_id">
                        <tr>
                            <td>
                                <span class="badge" :class="'badge-rank-' + Math.min(offset + i + 1, 3)" x-text="'#' + (offset + i + 1)"></span>
                            </td>
                            <td>
                                <a :href="`/guilds/{{ guild_id }}/users/${u.user_id}`" class="user-cell" style="text-decoration: none; color: inherit;">
                                    <div class="user-avatar" :style="'background: ' + getAvatarColor(u.user_id)">
                                        <span x-text="String(u.user_id).charAt(0)"></span>
                                    </div>
                                    <div class="user-info">
                                        <div class="user-name" x-text="'User ' + String(u.user_id).slice(0, 6) + '...'"></div>
                                        <div class="user-id" x-text="u.user_id"></div>
                                    </div>
                                </a>
                            </td>
                            <td><span class="badge badge-level" x-text="'Level ' + u.level"></span></td>
                            <td style="font-weight: 600;" x-text="fmtNum(u.xp)"></td>
                            <td x-text="fmtNum(u.messages)"></td>
                            <td>
                                <a :href="`/guilds/{{ guild_id }}/users/${u.user_id}`" class="btn btn-ghost btn-xs">View</a>
                            </td>
                        </tr>
                    </template>
                    <template x-if="users.length === 0">
                        <tr><td colspan="6" class="empty-state">No users found.</td></tr>
                    </template>
                </tbody>
            </table>
        </div>

        <div class="pagination">
            <button class="btn btn-ghost btn-sm" @click="prevPage()" :disabled="page <= 1">Prev</button>
            <span class="pagination-info" x-text="`Page ${page} of ${totalPages}`"></span>
            <button class="btn btn-ghost btn-sm" @click="nextPage()" :disabled="page >= totalPages">Next</button>
        </div>
    </div>
</div>

<script>
function leaderboardData() {
    return {
        users: [],
        total: 0,
        page: 1,
        perPage: 10,
        search: '',
        get totalPages() { return Math.max(1, Math.ceil(this.total / this.perPage)); },
        get offset() { return (this.page - 1) * this.perPage; },
        async init() { await this.load(); },
        async load() {
            const data = await API.getLeaderboard('{{ guild_id }}', this.perPage, this.offset, this.search);
            if (data) {
                this.users = data.users;
                this.total = data.total;
            }
        },
        prevPage() { if (this.page > 1) { this.page--; this.load(); } },
        nextPage() { if (this.page < this.totalPages) { this.page++; this.load(); } },
        fmtNum
    };
}
</script>

{% endblock %}
