{% extends "base.html" %}
{% block title %}User Profile{% endblock %}
{% block content %}

<div x-data="userData()" x-init="init()">
    <div class="section-bar">
        <div style="display: flex; align-items: center; gap: 12px;">
            <div class="user-avatar" :style="'background: ' + getAvatarColor(userId)">
                <span x-text="String(userId).charAt(0)"></span>
            </div>
            <div>
                <div style="font-weight: 600;" x-text="'User ' + String(userId).slice(0, 8) + '...'">User Profile</div>
                <div class="desc" x-text="'ID: ' + userId">--</div>
            </div>
        </div>
        <div class="section-actions">
            <a :href="`/guilds/{{ guild_id }}/leaderboard`" class="btn btn-ghost btn-sm">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 14px; height: 14px;">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
                Back to Leaderboard
            </a>
        </div>
    </div>

    <div class="grid grid-2">
        <div class="card">
            <div class="card-header">
                <h3>Level & XP</h3>
            </div>
            <div style="display: flex; gap: 28px; margin-bottom: 18px; flex-wrap: wrap;">
                <div>
                    <div class="info-stat-label">Level</div>
                    <div style="font-size: 34px; font-weight: 700; line-height: 1.2; letter-spacing: -0.5px;" x-text="profile.level">--</div>
                </div>
                <div>
                    <div class="info-stat-label">Server Rank</div>
                    <div style="font-size: 34px; font-weight: 700; line-height: 1.2; letter-spacing: -0.5px;" x-text="'#' + profile.rank">--</div>
                </div>
                <div>
                    <div class="info-stat-label">Total XP</div>
                    <div style="font-size: 34px; font-weight: 700; line-height: 1.2; letter-spacing: -0.5px;" x-text="fmtNum(profile.xp)">--</div>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">XP Progress</label>
                <div x-text="`${fmtNum(xpProgress)} / ${fmtNum(xpRequired)} (${xpPercent}%)`" style="font-size: 13px; margin-bottom: 6px; color: var(--text-secondary);"></div>
                <div class="progress-bar">
                    <div class="progress-fill" :style="'width: ' + Math.min(100, xpPercent) + '%'"></div>
                </div>
            </div>

            <div class="grid grid-2" style="gap: 8px;">
                <div class="info-stat">
                    <div class="info-stat-label">Messages</div>
                    <div class="info-stat-value" x-text="fmtNum(profile.messages)">--</div>
                </div>
                <div class="info-stat">
                    <div class="info-stat-label">Avg XP / Message</div>
                    <div class="info-stat-value" x-text="avgXp">--</div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h3>Admin Actions</h3>
            </div>
            <div class="form-group">
                <label class="form-label">Set Level</label>
                <div style="display: flex; gap: 8px;">
                    <input class="form-input" type="number" x-model.number="setLevelVal" min="0" placeholder="Level">
                    <button class="btn btn-primary btn-sm" @click="doSetLevel()">Set</button>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Add XP</label>
                <div style="display: flex; gap: 8px;">
                    <input class="form-input" type="number" x-model.number="addXpVal" placeholder="XP amount">
                    <button class="btn btn-success btn-sm" @click="doAddXp()">Add</button>
                </div>
            </div>
            <div style="margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border);">
                <button class="btn btn-danger btn-sm" @click="doReset()">Reset User</button>
            </div>
        </div>
    </div>
</div>

<script>
function userData() {
    return {
        userId: '{{ user_id }}',
        profile: { xp: 0, level: 0, messages: 0, rank: 0 },
        setLevelVal: 0,
        addXpVal: 0,
        xpProgress: 0,
        xpRequired: 1,
        xpPercent: 0,
        avgXp: '0',
        async init() {
            await this.load();
        },
        async load() {
            const data = await API.getUserProfile('{{ guild_id }}', '{{ user_id }}');
            if (data) {
                this.profile = data;
                this.setLevelVal = data.level;
                this.calcXp();
            }
        },
        calcXp() {
            const xp = this.profile.xp || 0;
            const lvl = this.profile.level || 0;
            const totalForCurrent = this.xpForLevel(lvl);
            const totalForNext = this.xpForLevel(lvl + 1);
            this.xpProgress = xp - totalForCurrent;
            this.xpRequired = totalForNext - totalForCurrent;
            this.xpPercent = this.xpRequired > 0 ? ((this.xpProgress / this.xpRequired) * 100).toFixed(1) : 0;
            this.avgXp = this.profile.messages > 0 ? fmtNum(Math.round(xp / this.profile.messages)) : '0';
        },
        xpForLevel(lvl) {
            let total = 0;
            for (let i = 1; i <= lvl; i++) total += 5 * (i ** 2) + (50 * i) + 100;
            return total;
        },
        async doSetLevel() {
            const result = await API.setLevel('{{ guild_id }}', '{{ user_id }}', this.setLevelVal);
            if (result && result.ok) {
                showToast(`Level set to ${result.level}`, 'success');
                await this.load();
            } else showToast('Failed to set level', 'error');
        },
        async doAddXp() {
            if (!this.addXpVal) return;
            const result = await API.addXp('{{ guild_id }}', '{{ user_id }}', this.addXpVal);
            if (result && result.ok) {
                showToast(`Added ${this.addXpVal} XP`, 'success');
                this.addXpVal = 0;
                await this.load();
            } else showToast('Failed to add XP', 'error');
        },
        async doReset() {
            if (!confirm('Reset this user\'s level data?')) return;
            const result = await API.resetUser('{{ guild_id }}', '{{ user_id }}');
            if (result && result.ok) {
                showToast('User reset', 'success');
                this.profile = { xp: 0, level: 0, messages: 0, rank: 0 };
                this.calcXp();
            } else showToast('Failed to reset', 'error');
        },
        fmtNum
    };
}
</script>

{% endblock %}
