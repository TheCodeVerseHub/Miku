{% extends "base.html" %}
{% block title %}Role Rewards{% endblock %}
{% block content %}

<div x-data="rewardsData()" x-init="await init()">
    <div class="section-bar">
        <div>
            <div class="desc">Award roles when users reach specific levels — <strong><span x-text="rewards.length"></span> rewards configured</strong></div>
        </div>
        <div class="section-actions">
            <div class="search-box">
                <input class="form-input" type="text" x-model="search" placeholder="Search rewards..." @input.debounce="200">
            </div>
            <button class="btn btn-primary" @click="openAdd()">+ Add Reward</button>
        </div>
    </div>

    <div class="card" style="padding: 0;">
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th style="width: 60px;">Level</th>
                        <th>Role</th>
                        <th style="width: 140px;">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <template x-for="r in filteredRewards" :key="r.level">
                        <tr>
                            <td style="font-size: 16px; font-weight: 700; color: var(--accent);" x-text="r.level + '.'"></td>
                            <td>
                                <div class="role-cell">
                                    <span class="role-dot" :style="'background: ' + roleColor(r.role_id)"></span>
                                    <div>
                                        <div class="user-name" x-text="roleName(r.role_id) || 'Unknown Role'"></div>
                                        <div class="user-id" x-text="r.role_id"></div>
                                    </div>
                                </div>
                            </td>
                            <td>
                                <div style="display: flex; gap: 6px;">
                                    <button class="btn btn-ghost btn-xs" @click="openEdit(r)">Edit</button>
                                    <button class="btn btn-danger btn-xs" @click="remove(r.level)">Remove</button>
                                </div>
                            </td>
                        </tr>
                    </template>
                    <template x-if="filteredRewards.length === 0">
                        <tr><td colspan="3" class="empty-state">
                            <template x-if="search">No rewards match your search.</template>
                            <template x-if="!search">No role rewards configured yet. Click "Add Reward" to get started.</template>
                        </td></tr>
                    </template>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Add/Edit Modal -->
    <div class="modal-overlay" :class="{ active: showModal }">
        <div class="modal">
            <h2 x-text="editing ? 'Edit Role Reward' : 'Add Role Reward'"></h2>
            <div class="form-group">
                <label class="form-label">Level</label>
                <input class="form-input" type="number" x-model.number="newLevel" min="1" placeholder="e.g. 5">
                <div class="form-error" x-show="formError" x-text="formError"></div>
            </div>
            <div class="form-group">
                <label class="form-label">Role</label>
                <div class="role-picker" @click.outside="pickerOpen = false">
                    <template x-if="!selectedRole">
                        <div class="role-picker-trigger" @click="pickerOpen = !pickerOpen">
                            <span class="placeholder">Search for a role...</span>
                        </div>
                    </template>
                    <template x-if="selectedRole">
                        <div class="role-picker-trigger" @click="pickerOpen = !pickerOpen">
                            <span class="role-dot" :style="'background: ' + hexColor(selectedRole.color)"></span>
                            <span x-text="selectedRole.name"></span>
                            <button class="clear-btn" @click.stop="clearRole()">&times;</button>
                        </div>
                    </template>
                    <div class="role-picker-dropdown" x-show="pickerOpen" x-cloak>
                        <div class="role-picker-search">
                            <input type="text" x-model="roleSearch" placeholder="Filter roles..." @input="filterRoles()">
                        </div>
                        <div class="role-picker-list">
                            <template x-for="role in filteredRoles" :key="role.id">
                                <div class="role-picker-option" @click="selectRole(role)">
                                    <span class="role-dot" :style="'background: ' + hexColor(role.color)"></span>
                                    <span class="role-name" x-text="role.name"></span>
                                </div>
                            </template>
                            <template x-if="filteredRoles.length === 0">
                                <div class="role-picker-no-results">No roles match your search</div>
                            </template>
                        </div>
                    </div>
                </div>
                <div class="form-error" x-show="formErrorRole" x-text="formErrorRole"></div>
            </div>
            <div class="modal-actions">
                <button class="btn btn-ghost" @click="closeModal()">Cancel</button>
                <button class="btn btn-primary" @click="save()" x-text="editing ? 'Save Changes' : 'Add Reward'"></button>
            </div>
        </div>
    </div>
</div>

<script>
function rewardsData() {
    return {
        rewards: [], showModal: false, editing: null, newLevel: 1,
        selectedRole: null, roles: [], pickerOpen: false, roleSearch: '',
        filteredRoles: [], search: '', formError: '', formErrorRole: '',

        get filteredRewards() {
            if (!this.search) return this.rewards;
            const q = this.search.toLowerCase();
            return this.rewards.filter(r =>
                r.level.toString().includes(q) ||
                (this.roleName(r.role_id) || '').toLowerCase().includes(q)
            );
        },

        async init() {
            const [r, roles] = await Promise.all([
                API.getRewards('{{ guild_id }}'),
                API.getRoles('{{ guild_id }}'),
            ]);
            this.rewards = r || [];
            this.roles = roles || [];
            this.filteredRoles = this.roles;
        },

        roleName(roleId) { const r = this.roles.find(r => r.id === roleId); return r ? r.name : null; },
        roleColor(roleId) { const r = this.roles.find(r => r.id === roleId); return r ? this.hexColor(r.color) : getAvatarColor(roleId); },
        hexColor(color) { if (!color || color === 0) return '#99aab5'; return '#' + color.toString(16).padStart(6, '0'); },

        filterRoles() {
            const q = this.roleSearch.toLowerCase();
            this.filteredRoles = this.roles.filter(r => r.name.toLowerCase().includes(q) || r.id.includes(q));
        },

        selectRole(role) { this.selectedRole = role; this.pickerOpen = false; this.roleSearch = ''; this.formErrorRole = ''; },
        clearRole() { this.selectedRole = null; },

        openAdd() { this.editing = null; this.newLevel = 1; this.selectedRole = null; this.formError = ''; this.formErrorRole = ''; this.showModal = true; },

        openEdit(r) {
            this.editing = r; this.newLevel = r.level;
            this.selectedRole = this.roles.find(role => role.id === r.role_id) || null;
            this.formError = ''; this.formErrorRole = '';
            this.showModal = true;
        },

        closeModal() { this.showModal = false; this.editing = null; this.selectedRole = null; this.formError = ''; this.formErrorRole = ''; },

        validate() {
            let valid = true;
            this.formError = ''; this.formErrorRole = '';
            if (!this.newLevel || this.newLevel < 1) { this.formError = 'Please enter a valid level (1 or higher).'; valid = false; }
            if (!this.selectedRole) { this.formErrorRole = 'Please select a role.'; valid = false; }
            return valid;
        },

        async save() {
            if (!this.validate()) return;
            if (this.editing) await API.removeReward('{{ guild_id }}', this.editing.level);
            const result = await API.addReward('{{ guild_id }}', this.newLevel, this.selectedRole.id);
            if (result && result.ok) {
                showToast(this.editing ? 'Reward updated' : 'Role reward added', 'success');
                this.closeModal();
                this.rewards = await API.getRewards('{{ guild_id }}') || [];
                this.newLevel = 1;
            } else showToast('Failed to save reward', 'error');
        },

        async remove(level) {
            if (!await confirmDialog(`Remove reward for Level ${level}?`, 'Remove Reward')) return;
            const result = await API.removeReward('{{ guild_id }}', level);
            if (result && result.ok) { showToast('Reward removed', 'success'); this.rewards = await API.getRewards('{{ guild_id }}') || []; }
            else showToast('Failed to remove reward', 'error');
        }
    };
}
</script>

{% endblock %}
