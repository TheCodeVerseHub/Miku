{% extends "base.html" %}
{% block title %}Role Rewards{% endblock %}
{% block content %}

<div x-data="rewardsData()" x-init="init()">
    <div class="section-bar">
        <div>
            <div class="desc">Award roles when users reach specific levels &mdash; <strong><span x-text="rewards.length"></span> rewards configured</strong></div>
        </div>
        <div class="section-actions">
            <button class="btn btn-primary" @click="showAdd = true">Add Reward</button>
        </div>
    </div>

    <div class="card" style="padding: 0;">
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th style="width: 80px;">Level</th>
                        <th>Role</th>
                        <th style="width: 100px;">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <template x-for="r in rewards" :key="r.level">
                        <tr>
                            <td><span class="badge badge-level" x-text="'Level ' + r.level"></span></td>
                            <td>
                                <div class="role-cell">
                                    <span class="role-dot" :style="'background: ' + getAvatarColor(r.role_id)"></span>
                                    <span style="font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; font-size: 13px;" x-text="r.role_id"></span>
                                </div>
                            </td>
                            <td>
                                <button class="btn btn-danger btn-xs" @click="remove(r.level)">Remove</button>
                            </td>
                        </tr>
                    </template>
                    <template x-if="rewards.length === 0">
                        <tr><td colspan="3" class="empty-state">No role rewards configured yet.</td></tr>
                    </template>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Add Modal -->
    <div class="modal-overlay" :class="{ active: showAdd }">
        <div class="modal">
            <h2>Add Role Reward</h2>
            <div class="form-group">
                <label class="form-label">Level</label>
                <input class="form-input" type="number" x-model.number="newLevel" min="1" placeholder="e.g. 5">
            </div>
            <div class="form-group">
                <label class="form-label">Role ID</label>
                <input class="form-input" type="number" x-model.number="newRoleId" placeholder="Discord role ID">
                <div class="form-hint">Enable Developer Mode in Discord &gt; right-click a role &gt; Copy ID</div>
            </div>
            <div class="modal-actions">
                <button class="btn btn-ghost" @click="showAdd = false">Cancel</button>
                <button class="btn btn-primary" @click="add()">Add Reward</button>
            </div>
        </div>
    </div>
</div>

<script>
function rewardsData() {
    return {
        rewards: [],
        showAdd: false,
        newLevel: 1,
        newRoleId: null,
        async init() {
            this.rewards = await API.getRewards('{{ guild_id }}') || [];
        },
        async add() {
            if (!this.newLevel || !this.newRoleId) {
                showToast('Please fill in all fields', 'error');
                return;
            }
            const result = await API.addReward('{{ guild_id }}', this.newLevel, this.newRoleId);
            if (result && result.ok) {
                showToast('Role reward added', 'success');
                this.showAdd = false;
                this.rewards = await API.getRewards('{{ guild_id }}') || [];
                this.newLevel = 1;
                this.newRoleId = null;
            } else showToast('Failed to add reward', 'error');
        },
        async remove(level) {
            if (!confirm(`Remove reward for Level ${level}?`)) return;
            const result = await API.removeReward('{{ guild_id }}', level);
            if (result && result.ok) {
                showToast('Reward removed', 'success');
                this.rewards = await API.getRewards('{{ guild_id }}') || [];
            } else showToast('Failed to remove reward', 'error');
        }
    };
}
</script>

{% endblock %}
